<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- displays site properly based on user's device -->

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./images/favicon-32x32.png"
    />

    <title>Frontend Mentor | QR code component</title>

    <!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->
    <style>
      body {
        padding: 0;
        margin: 0;
        box-sizing: border-box;
      }
      main {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
      }
      .container {
        position: relative;
        margin: 100px 400px;
        width: 1000px;
        height: 600px;
        background-color: #d6e2f0;
        display: flex;
        flex-direction: row;
        align-items: center;
        justify-content: space-around;
      }

      .card {
        position: absolute;
        width: 250px;
        height: auto;
        display: flex;
        flex-direction: column;
        align-items: center;
        flex-flow: column;
        background-color: #ffffff;
        font-family: sans-serif;
        text-align: center;
        padding: 5px;
        border: 10px solid white;
        border-radius: 20px;
      }
      article img {
        border: 1px solid white;
        border-radius: 10px;
      }
      @font-face {
        font-family: outfit-font;
        src: url(frontend-mentor-practice/outfit-font/Outfit-VariableFont_wght.ttf);
      }
      .card h1 {
        font-size: 1.2em;
      }
      article p {
        font-size: 15px;
        font-family: outfit-font;
        font-weight: 700;
        color: grey;
      }
      .attribution {
        font-size: 11px;
        text-align: center;
      }
    </style>
  </head>
  <body>
    <main>
      <div class="container">
        <article class="card">
          <img
            src="./images/image-qr-code.png"
            alt="QR Code picture"
            height="250"
            width="250"
          />
          <h1>Improve your front-end skills by building projects</h1>
          <p>
            Scan the QR code to visit Frontend Mentor and take your coding
            skills to the next level
          </p>
        </article>
      </div>
      <footer class="attribution">
        Challenge by
        <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a
        >. Coded by
        <a href="mailto:obaidullahabid98@gmail.com">obaidullah abid</a>.
      </footer>
    </main>
  </body>
</html>

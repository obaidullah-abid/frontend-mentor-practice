<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- displays site properly based on user's device -->

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./images/favicon-32x32.png"
    />

    <title>Frontend Mentor | QR code component</title>

    <style>
      *,
      *::after,
      *::before {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      main {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
      }
      .container {
        /* position: relative; */
        /* margin: 100px 400px; */
        /* width: 1000px; */
        /* height: 600px; */
        margin-top: 100px;
        max-width: 62.5em;
        width: 100%;
        height: 37.5em;
        background-color: #d6e2f0;
        display: flex;
        flex-direction: row;
        align-items: center;
        justify-content: center;
      }

      .card {
        /* position: absolute; */
        /* width: 250px; */
        /* flex-flow: column; */
        max-width: 250px;
        width: 100%;
        height: auto;
        display: flex;
        flex-direction: column;
        align-items: center;
        background-color: #ffffff;
        font-family: outfit-font;
        text-align: center;
        padding: 16px;
        border-radius: 20px;
      }
      article img {
        width: 100%;
        border-radius: 10px;
      }
      @font-face {
        font-family: outfit-font;
        src: url(./Outfit-VariableFont_wght.ttf);
      }
      .card h1 {
        font-size: 1.2em;
        color: #1f3251;
      }
      article p {
        font-size: 15px;
        font-family: outfit-font;
        font-weight: 700;
        color: grey;
      }
      .attribution {
        font-size: 11px;
        text-align: center;
      }
    </style>
  </head>
  <body>
    <main>
      <div class="container">
        <article class="card">
          <img src="./images/image-qr-code.png" alt="QR Code picture" />
          <h1>Improve your front-end skills by building projects</h1>
          <p>
            Scan the QR code to visit Frontend Mentor and take your coding
            skills to the next level
          </p>
        </article>
      </div>
      <footer class="attribution">
        Challenge by
        <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a
        >. Coded by
        <a href="mailto:obaidullahabid98@gmail.com">obaidullah abid</a>.
      </footer>
    </main>
  </body>
</html>
